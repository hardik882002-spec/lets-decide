<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Decide</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:'Inter';
text-align:center;

background-image:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04) 0%, transparent 40%),
radial-gradient(circle at 80% 60%, rgba(255,255,255,0.03) 0%, transparent 40%),
linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

h1{
font-family:'Space Grotesk';
font-size:64px;
}

.red{color:#ff3b3b;}

button{
background:#ff3b3b;
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin:6px;
font-weight:600;
}

button:hover{
background:#ff2020;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
border:1px solid #333;
color:white;
border-radius:6px;
}

.decision-card{
background:#111;
padding:25px;
margin:25px 0;
border-radius:12px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:25px;
align-items:center;
}

.chart{
font-size:14px;
opacity:.9;
}

/* MODAL */

.modal-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.modal{
background:#111;
border:1px solid #333;
padding:40px;
border-radius:12px;
width:420px;
text-align:center;
}

.modal h3{
font-family:'Space Grotesk';
margin-bottom:20px;
}

.modal textarea{
width:100%;
margin-top:15px;
background:#0a0a0a;
border:1px solid #333;
color:white;
border-radius:6px;
padding:10px;
height:80px;
}

.modal-buttons{
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Let's <span class="red">Decide</span></h1>

<p>Stop overthinking. Post your decision and get clarity.</p>

<button onclick="scrollToDecision()">Post My Decision</button>

</div>

<div class="container" id="decision">

<h2>Post Your Decision</h2>

<input id="decisionText" placeholder="Should I quit my job?">

<select id="emotion">
<option>Emotion</option>
<option>Confused</option>
<option>Afraid</option>
<option>Angry</option>
<option>Hopeful</option>
</select>

<textarea id="context" placeholder="Optional context"></textarea>

<button onclick="postDecision()">Post Decision</button>

</div>

<div class="container">

<h2>Recent Decisions</h2>

<div id="decisionFeed"></div>

</div>

<div id="modalContainer"></div>

<script>

function scrollToDecision(){
document.getElementById("decision").scrollIntoView({behavior:"smooth"});
}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp,
getDocs,
getDoc,
doc,
updateDoc,
increment,
arrayUnion
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDGdMUs5Gd3vfyPJRCyeSImg_ygN_Otoe0",
authDomain:"let-s-decide-14d07.firebaseapp.com",
projectId:"let-s-decide-14d07",
storageBucket:"let-s-decide-14d07.appspot.com",
messagingSenderId:"212548607958",
appId:"1:212548607958:web:84ee90b5371148aa700e77"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* DEVICE LOCK */

let voterId=localStorage.getItem("voterId");

if(!voterId){
voterId=crypto.randomUUID();
localStorage.setItem("voterId",voterId);
}

/* POST DECISION */

window.postDecision=async function(){

const text=document.getElementById("decisionText").value;
const emotion=document.getElementById("emotion").value;
const context=document.getElementById("context").value;

await addDoc(collection(db,"decisions"),{

text,
emotion,
context,

experiencedYes:0,
experiencedNo:0,
experiencedWait:0,

adviceYes:0,
adviceNo:0,
adviceWait:0,

voters:[],

createdAt:serverTimestamp()

});

loadDecisions();

}

/* MODAL SYSTEM */

function openModal(content){

document.getElementById("modalContainer").innerHTML=`

<div class="modal-overlay">

<div class="modal">

${content}

</div>

</div>

`;

}

function closeModal(){

document.getElementById("modalContainer").innerHTML="";

}

/* VOTE FLOW */

let pendingVote={};

window.startVote=function(id,type){

pendingVote={id,type};

openModal(`

<h3>Have you experienced this situation yourself?</h3>

<div class="modal-buttons">

<button onclick="experiencedYes()">YES</button>
<button onclick="experiencedNo()">NO</button>

</div>

`);

}

window.experiencedYes=function(){

closeModal();

submitVote(true,"");

}

window.experiencedNo=function(){

openModal(`

<h3>Do you still think you can advise?</h3>

<div class="modal-buttons">

<button onclick="adviceYes()">YES</button>
<button onclick="adviceNo()">NO</button>

</div>

`);

}

window.adviceNo=function(){

openModal(`

<h3>Thank you for being honest</h3>

<p>Please vote on another decision.</p>

<div class="modal-buttons">

<button onclick="closeModal()">OK</button>

</div>

`);

}

window.adviceYes=function(){

openModal(`

<h3>Why do you think you can advise?</h3>

<textarea id="adviceReason" maxlength="200"></textarea>

<div class="modal-buttons">

<button onclick="submitAdvice()">SUBMIT</button>

</div>

`);

}

window.submitAdvice=function(){

let reason=document.getElementById("adviceReason").value;

if(reason.length<10){

alert("Please explain briefly.");

return;

}

closeModal();

submitVote(false,reason);

}

/* SUBMIT VOTE */

async function submitVote(experienced,reason){

const {id,type}=pendingVote;

const ref=doc(db,"decisions",id);

const snap=await getDoc(ref);

const data=snap.data();

if((data.voters||[]).includes(voterId)){

alert("You already voted.");

return;

}

let update={};

if(experienced){

if(type==="YES") update.experiencedYes=increment(1);
if(type==="NO") update.experiencedNo=increment(1);
if(type==="WAIT") update.experiencedWait=increment(1);

}else{

if(type==="YES") update.adviceYes=increment(1);
if(type==="NO") update.adviceNo=increment(1);
if(type==="WAIT") update.adviceWait=increment(1);

}

update.voters=arrayUnion(voterId);

await updateDoc(ref,update);

loadDecisions();

}

/* VERDICT */

function calculateVerdict(data){

let yes=data.experiencedYes*0.7 + data.adviceYes*0.3;
let no=data.experiencedNo*0.7 + data.adviceNo*0.3;
let wait=data.experiencedWait*0.7 + data.adviceWait*0.3;

let total=yes+no+wait;

if(total===0) return {verdict:"WAIT",confidence:0};

let max=Math.max(yes,no,wait);

let verdict="WAIT";

if(max===yes) verdict="YES";
if(max===no) verdict="NO";

let confidence=Math.round((max/total)*100);

return {verdict,confidence};

}

/* LOAD DECISIONS */

async function loadDecisions(){

const snapshot=await getDocs(collection(db,"decisions"));

const feed=document.getElementById("decisionFeed");

feed.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();

const result=calculateVerdict(data);

const card=document.createElement("div");

card.className="decision-card";

card.innerHTML=`

<div class="grid">

<div>

<h3>${data.text}</h3>

<p>Emotion: ${data.emotion}</p>

<p>${data.context||""}</p>

</div>

<div>

<button onclick="startVote('${docSnap.id}','YES')">YES</button>
<button onclick="startVote('${docSnap.id}','WAIT')">WAIT</button>
<button onclick="startVote('${docSnap.id}','NO')">NO</button>

</div>

<div class="chart">

<b>Experienced</b><br>

YES ${data.experiencedYes||0}<br>
NO ${data.experiencedNo||0}<br>
WAIT ${data.experiencedWait||0}

<br><br>

<b>Advice</b><br>

YES ${data.adviceYes||0}<br>
NO ${data.adviceNo||0}<br>
WAIT ${data.adviceWait||0}

<br><br>

<b>Verdict:</b> ${result.verdict} (${result.confidence}%)

</div>

</div>

`;

feed.appendChild(card);

});

}

loadDecisions();

</script>

</body>
</html>
