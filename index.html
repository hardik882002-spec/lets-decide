<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Let's Decide</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:'Inter',sans-serif;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

h1{
font-family:'Space Grotesk';
font-size:64px;
}

button{
background:#ff3b3b;
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin:6px;
font-weight:600;
}

button:hover{
background:#ff2020;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
border:1px solid #333;
color:white;
border-radius:6px;
}

.decision-card{
background:#111;
padding:25px;
margin:25px 0;
border-radius:12px;
text-align:left;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:25px;
align-items:center;
}

.meta{
font-size:14px;
opacity:.9;
line-height:1.7;
}

.chart-box{
width:180px;
margin:auto;
}

.modal-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.modal{
background:#111;
border:1px solid #333;
padding:40px;
border-radius:12px;
width:420px;
text-align:center;
}

.modal textarea{
width:100%;
margin-top:15px;
background:#0a0a0a;
border:1px solid #333;
color:white;
border-radius:6px;
padding:10px;
height:90px;
}

</style>
</head>

<body>

<div class="container">

<h1>Let's Decide</h1>

<p>Stop overthinking. Post your decision and get clarity.</p>

</div>

<div class="container">

<h2>Post Your Decision</h2>

<input id="decisionText" placeholder="Your decision question">

<select id="category">
<option>Category</option>
<option>Career</option>
<option>Relationship</option>
<option>Life</option>
<option>Money</option>
<option>Education</option>
<option>Health</option>
</select>

<select id="gender">
<option>Gender</option>
<option>Male</option>
<option>Female</option>
<option>Prefer not to say</option>
</select>

<input id="age" type="number" placeholder="Your Age (16+ only)">

<select id="state">
<option>Where are you from</option>
<option>Maharashtra</option>
<option>Gujarat</option>
<option>Delhi</option>
<option>Karnataka</option>
<option>Tamil Nadu</option>
<option>Uttar Pradesh</option>
<option>Madhya Pradesh</option>
<option>Rajasthan</option>
<option>Punjab</option>
<option>Haryana</option>
<option>West Bengal</option>
<option>Bihar</option>
<option>Odisha</option>
<option>Kerala</option>
<option>Assam</option>
<option>Jharkhand</option>
<option>Chhattisgarh</option>
<option>Telangana</option>
<option>Andhra Pradesh</option>
<option>Himachal Pradesh</option>
<option>Uttarakhand</option>
<option>Goa</option>
<option>Tripura</option>
<option>Meghalaya</option>
<option>Manipur</option>
<option>Nagaland</option>
<option>Sikkim</option>
<option>Mizoram</option>
<option>Arunachal Pradesh</option>
</select>

<select id="emotion">
<option>How you are feeling right now</option>
<option>Confused</option>
<option>Afraid</option>
<option>Stressed</option>
<option>Hopeful</option>
<option>Excited</option>
<option>Lost</option>
<option>Angry</option>
<option>Curious</option>
<option>Overwhelmed</option>
<option>Optimistic</option>
<option>Doubtful</option>
<option>Calm</option>
</select>

<select id="deadline">
<option>Decision Deadline</option>
<option value="3600">1 Hour</option>
<option value="21600">6 Hours</option>
<option value="86400">24 Hours</option>
<option value="259200">3 Days</option>
</select>

<textarea id="context" placeholder="Optional context"></textarea>

<button onclick="postDecision()">Post Decision</button>

</div>

<div class="container">

<h2>Recent Decisions</h2>

<div id="decisionFeed"></div>

</div>

<div id="modalContainer"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp,
getDocs,
getDoc,
doc,
updateDoc,
increment,
arrayUnion
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIza...",
authDomain:"let-s-decide-14d07.firebaseapp.com",
projectId:"let-s-decide-14d07",
storageBucket:"let-s-decide-14d07.appspot.com",
messagingSenderId:"212548607958",
appId:"1:212548607958:web:84ee90b5371148aa700e77"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let voterId=localStorage.getItem("voterId");

if(!voterId){
voterId=crypto.randomUUID();
localStorage.setItem("voterId",voterId);
}

window.postDecision=async function(){

const age=parseInt(document.getElementById("age").value);

if(age<16){
alert("Only users 16+ can post decisions");
return;
}

await addDoc(collection(db,"decisions"),{

text:decisionText.value,
category:category.value,
gender:gender.value,
age:age,
state:state.value,
emotion:emotion.value,
context:context.value,
deadline:deadline.value,

experiencedYes:0,
experiencedNo:0,
experiencedWait:0,

adviceYes:0,
adviceNo:0,
adviceWait:0,

voters:[],

createdAt:serverTimestamp()

});

loadDecisions();

}

function openModal(html){
modalContainer.innerHTML=`<div class="modal-overlay"><div class="modal">${html}</div></div>`;
}

window.closeModal=function(){
modalContainer.innerHTML="";
}

let pendingVote={};

window.startVote=function(id,type){

pendingVote={id,type};

openModal(`
<h3>Have you experienced this situation yourself?</h3>
<button onclick="experiencedYes()">YES</button>
<button onclick="experiencedNo()">NO</button>
`);

}

window.experiencedYes=function(){
closeModal();
submitVote(true);
}

window.experiencedNo=function(){

openModal(`
<h3>Do you still think you can advise?</h3>
<button onclick="adviceYes()">YES</button>
<button onclick="adviceNo()">NO</button>
`);

}

window.adviceNo=function(){

openModal(`
<h3>Thank you for being honest</h3>
<button onclick="closeModal()">OK</button>
`);

}

window.adviceYes=function(){

openModal(`
<h3>Why do you think you can advise?</h3>
<textarea id="reason" maxlength="200"></textarea>
<button onclick="submitAdvice()">SUBMIT</button>
`);

}

window.submitAdvice=function(){

const r=document.getElementById("reason").value;

if(r.length<10){
alert("Please explain briefly");
return;
}

closeModal();
submitVote(false);

}

async function submitVote(experienced){

const {id,type}=pendingVote;

const ref=doc(db,"decisions",id);

const snap=await getDoc(ref);
const data=snap.data();

if((data.voters||[]).includes(voterId)){
alert("You already voted.");
return;
}

let update={};

if(experienced){
if(type==="YES") update.experiencedYes=increment(1);
if(type==="NO") update.experiencedNo=increment(1);
if(type==="WAIT") update.experiencedWait=increment(1);
}else{
if(type==="YES") update.adviceYes=increment(1);
if(type==="NO") update.adviceNo=increment(1);
if(type==="WAIT") update.adviceWait=increment(1);
}

update.voters=arrayUnion(voterId);

await updateDoc(ref,update);

loadDecisions();

}

function calculateVerdict(d){

let yes=d.experiencedYes*0.7 + d.adviceYes*0.3;
let no=d.experiencedNo*0.7 + d.adviceNo*0.3;
let wait=d.experiencedWait*0.7 + d.adviceWait*0.3;

let total=yes+no+wait;

if(total===0) return {verdict:"WAIT",confidence:0};

let max=Math.max(yes,no,wait);

let verdict="WAIT";

if(max===yes) verdict="YES";
if(max===no) verdict="NO";

let confidence=Math.round((max/total)*100);

return {verdict,confidence};

}

async function loadDecisions(){

const snapshot=await getDocs(collection(db,"decisions"));

decisionFeed.innerHTML="";

snapshot.forEach(docSnap=>{

const d=docSnap.data();
const result=calculateVerdict(d);

const card=document.createElement("div");

card.className="decision-card";

card.innerHTML=`

<div class="grid">

<div>

<h3>${d.text}</h3>

<div class="meta">

Category: ${d.category}<br>
Gender: ${d.gender}<br>
Age: ${d.age}<br>
Location: ${d.state}<br>
Emotion: ${d.emotion}<br>

${d.context || ""}

</div>

</div>

<div>

<button onclick="startVote('${docSnap.id}','YES')">YES</button>
<button onclick="startVote('${docSnap.id}','WAIT')">WAIT</button>
<button onclick="startVote('${docSnap.id}','NO')">NO</button>

<p><b>Verdict:</b> ${result.verdict} (${result.confidence}%)</p>

</div>

<div>

<canvas id="exp-${docSnap.id}" width="150"></canvas>

<canvas id="adv-${docSnap.id}" width="150"></canvas>

</div>

</div>
`;

decisionFeed.appendChild(card);

new Chart(document.getElementById(`exp-${docSnap.id}`),{
type:"doughnut",
data:{
labels:["YES","NO","WAIT"],
datasets:[{
data:[d.experiencedYes||0,d.experiencedNo||0,d.experiencedWait||0],
backgroundColor:["#22c55e","#ef4444","#f59e0b"]
}]
},
options:{plugins:{legend:{display:false}}}
});

new Chart(document.getElementById(`adv-${docSnap.id}`),{
type:"doughnut",
data:{
labels:["YES","NO","WAIT"],
datasets:[{
data:[d.adviceYes||0,d.adviceNo||0,d.adviceWait||0],
backgroundColor:["#22c55e","#ef4444","#f59e0b"]
}]
},
options:{plugins:{legend:{display:false}}}
});

});

}

loadDecisions();

</script>

</body>
</html>
