<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:'Inter',sans-serif;
text-align:center;

background-image:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04) 0%, transparent 40%),
radial-gradient(circle at 80% 60%, rgba(255,255,255,0.03) 0%, transparent 40%),
linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),

background-size:auto,auto,40px 40px,40px 40px;
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

h1{
font-family:'Space Grotesk',sans-serif;
font-size:64px;
letter-spacing:-2px;

}

h2{
font-family:'Space Grotesk';
font-size:36px;
margin-bottom:20px;
}

.red{color:#ff3b3b;}

.subtitle{font-size:18px;opacity:.8;margin-bottom:40px;}

button{
background:#ff3b3b;
border:none;
color:white;
padding:12px 24px;

}

button:hover{background:#ff2020;}

.section{margin-top:100px;}

input,select,textarea{

border:1px solid #333;

border-radius:6px;
}

.feed-card{
background:#111;
padding:20px;
margin:20px;
border-radius:10px;
}

.chart{
margin-top:10px;
font-size:14px;
opacity:.9;
}

textarea.reason{
height:60px;
}

footer{
margin-top:120px;
padding:40px;
border-top:1px solid #222;

}

</style>
</head>

<body>

<div class="container">

<h1>Let's <span class="red">Decide</span></h1>

<p class="subtitle">
Stop overthinking. Post your decision and get clarity from people who’ve faced the same situation.
</p>

<button onclick="scrollToDecision()">Post My Decision</button>

</div>

<div class="container section" id="decision">

<h2>Post Your Decision</h2>

<input id="decisionText" type="text" placeholder="Should I quit my job for a startup?">

<select id="category">
<option>Select Category</option>
<option>Career</option>
<option>Relationship</option>
<option>Money</option>
<option>Life</option>
</select>

<select id="emotion">
<option>How are you feeling?</option>
<option>Confused</option>
<option>Afraid</option>
<option>Angry</option>
<option>Hopeful</option>
<option>Stuck</option>
</select>

<textarea id="context" placeholder="Optional context..."></textarea>

<button onclick="postDecision()">Post Decision</button>

</div>

<div class="container section">
<h2>Recent Decisions</h2>
<div id="decisionFeed"></div>
</div>

<footer>
<p>Let's Decide</p>
<p>Anonymous. Fast. Clear.</p>
</footer>

<script>

function scrollToDecision(){
document.getElementById("decision").scrollIntoView({behavior:"smooth"});
}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, getDocs, getDoc, doc, updateDoc, increment, arrayUnion }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {
apiKey: "AIzaSyDGdMUs5Gd3vfyPJRCyeSImg_ygN_Otoe0",
authDomain: "let-s-decide-14d07.firebaseapp.com",
projectId: "let-s-decide-14d07",
storageBucket: "let-s-decide-14d07.appspot.com",
messagingSenderId: "212548607958",
appId: "1:212548607958:web:84ee90b5371148aa700e77"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------- DEVICE ID (Vote Lock) ---------- */

let voterId = localStorage.getItem("voterId");

if(!voterId){
voterId = crypto.randomUUID();
localStorage.setItem("voterId", voterId);
}

/* ---------- POST DECISION ---------- */

window.postDecision = async function(){

const text=document.getElementById("decisionText").value;
const category=document.getElementById("category").value;
const emotion=document.getElementById("emotion").value;
const context=document.getElementById("context").value;

await addDoc(collection(db,"decisions"),{

text,
category,
emotion,
context,

experiencedYes:0,
experiencedNo:0,
experiencedWait:0,

adviceYes:0,
adviceNo:0,
adviceWait:0,

voters:[],

createdAt:serverTimestamp()

});

loadDecisions();

}

/* ---------- VOTE FUNCTION ---------- */

window.vote = async function(id,type,experienced,reason){

const ref = doc(db,"decisions",id);

const decisionSnap = await getDoc(ref);
const decision = decisionSnap.data();

/* FIX: ensure voters array exists */

const voters = decision.voters || [];

if(voters.includes(voterId)){
alert("You already voted on this decision.");
return;
}

let update = {};

if(experienced){

if(type==="YES") update.experiencedYes = increment(1);
if(type==="NO") update.experiencedNo = increment(1);
if(type==="WAIT") update.experiencedWait = increment(1);

}else{

if(reason.trim()===""){
alert("Please explain your advice.");
return;
}

if(type==="YES") update.adviceYes = increment(1);
if(type==="NO") update.adviceNo = increment(1);
if(type==="WAIT") update.adviceWait = increment(1);

}

update.voters = arrayUnion(voterId);

await updateDoc(ref,update);

loadDecisions();

}

/* ---------- FINAL VERDICT ---------- */

function calculateVerdict(data){

let yes = data.experiencedYes*0.7 + data.adviceYes*0.3;
let no = data.experiencedNo*0.7 + data.adviceNo*0.3;
let wait = data.experiencedWait*0.7 + data.adviceWait*0.3;

let max=Math.max(yes,no,wait);

let verdict="WAIT";

if(max===yes) verdict="YES";
if(max===no) verdict="NO";

let total=yes+no+wait;
let confidence=Math.round((max/total)*100);

return {verdict,confidence};

}

/* ---------- LOAD FEED ---------- */

async function loadDecisions(){

import { getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const decisionSnap = await getDoc(ref);
const decision = decisionSnap.data();

const data = docSnap.data();

data.experiencedYes = data.experiencedYes || 0;
data.experiencedNo = data.experiencedNo || 0;
data.experiencedWait = data.experiencedWait || 0;

data.adviceYes = data.adviceYes || 0;
data.adviceNo = data.adviceNo || 0;
data.adviceWait = data.adviceWait || 0;

data.voters = data.voters || [];
const result=calculateVerdict(data);

const card=document.createElement("div");
card.className="feed-card";

card.innerHTML=`

<h3>${data.text}</h3>
<p>Emotion: ${data.emotion}</p>

<div class="chart">
<b>Experienced Votes</b><br>
YES ${data.experiencedYes} |
NO ${data.experiencedNo} |
WAIT ${data.experiencedWait}
</div>

<div class="chart">
<b>Advice Votes</b><br>
YES ${data.adviceYes} |
NO ${data.adviceNo} |
WAIT ${data.adviceWait}
</div>

<p><b>Verdict:</b> ${result.verdict} (${result.confidence}% confidence)</p>

<p>Have you experienced this situation?</p>

<button onclick="vote('${docSnap.id}','YES',true,'')">YES</button>
<button onclick="vote('${docSnap.id}','NO',true,'')">NO</button>
<button onclick="vote('${docSnap.id}','WAIT',true,'')">WAIT</button>

<br><br>

<textarea class="reason" id="reason-${docSnap.id}" placeholder="If you haven't experienced this, explain your advice"></textarea>

<br>

<button onclick="vote('${docSnap.id}','YES',false,document.getElementById('reason-${docSnap.id}').value)">Advice YES</button>
<button onclick="vote('${docSnap.id}','NO',false,document.getElementById('reason-${docSnap.id}').value)">Advice NO</button>
<button onclick="vote('${docSnap.id}','WAIT',false,document.getElementById('reason-${docSnap.id}').value)">Advice WAIT</button>

`;

feed.appendChild(card);

});

}

loadDecisions();

</script>

</body>
</html>
